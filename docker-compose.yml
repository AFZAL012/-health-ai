version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medical-diagnosis-postgres
    environment:
      POSTGRES_DB: medical_diagnosis
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meduser -d medical_diagnosis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network

  redis:
    image: redis:7-alpine
    container_name: medical-diagnosis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network

volumes:
  postgres_data:
  redis_data:

networks:
  medical-network:
    driver: bridge
