services:
  # Backend Web Service
  - type: web
    name: health-ai-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:create_app\(\)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: health-ai-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: health-ai-frontend
          property: host

  # Frontend Static Site (Defined as type: web with env: static)
  - type: web
    name: health-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: health-ai-backend
          property: host

# Database
databases:
  - name: health-ai-db
    plan: free
